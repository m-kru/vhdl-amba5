name: APB tests

on: [push, pull_request]

jobs:
  test-apb-nvc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Setup NVC simulator
        uses: nickg/setup-nvc@v1
        with:
          version: latest
      - name: Install Tcl
        run: |
          sudo apt-get update
          sudo apt-get install -y tcl
      - name: Get HBS
        run: |
          wget https://raw.github.com/m-kru/hbs/master/hbs
          chmod +x hbs
      - name: Run tests
        run: |
          export HBS_TOOL=nvc
          export HBS_BUILD_DIR=build-apb-nvc
          ./hbs test apb
